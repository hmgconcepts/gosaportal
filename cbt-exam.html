<body>
<main class="login-shell">

      <img src="assets/img/logo.png" alt="School" onerror="this.style.display='none'">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
/* ===================================================================
   CBT Exam Runner v15 — Final Stable
   - Multi-subject tabs (UTME-style) always appear when the question
     bank contains per-question section/subject metadata
   - Per-subject progress counters (answered/total)
   - Subject-aware previous/next within current subject
   - Defensive against missing fields, bad question banks, lost Supabase
     - Anonymous + registered candidates
     - Anti-cheat with watermark, focus loss, copy/paste blocks
     - Robust submit with 6 retries and a pending-queue fallback
   =================================================================== */
(function(){
  const $ = (id) => document.getElementById(id);
  const esc = (s) => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  const FREE_TYPES_NO_OPTIONS = ['short','short_answer','numeric','essay','code','cloze','multinumeric','fill_blank','math_equation','fill'];

  function toast(m, t, ms) {
    if (window.toast) return window.toast(m, t, ms);
    // Fallback: use the global toast from app.js if loaded
    if (window.Notifications && window.Notifications.showInApp) { window.Notifications.showInApp(m, '', t); return; }
    if (t === 'danger' || t === 'warning') console.warn('[toast]', m);
  }

  function openModal(){}
  function closeModal(){}

  /* ---------- State ---------- */
  const Exam = {
    data: null,
    answers: [],
    idx: 0,
    timer: null,
    deadline: 0,
    monitor: null,
    flags: {},
    startTs: 0,
    violations: 0,
    violationLog: [],
    student: null,
    _done: false,
  };

  Exam.qs = function(){ return (this.data && (this.data._questions || this.data.questions || this.data.csv_data)) || []; };
  Exam.param = function(){
    const u = new URLSearchParams(location.search);
    return (u.get('code') || u.get('exam') || u.get('c') || '').toUpperCase().trim();
  };
  Exam.root = function(){ return document.getElementById('exam-root'); };

  // ENTERPRISE V13 / V5: robust UTME-style multi-subject experience.
  /* ---------- Subject tab logic ---------- */
  Exam.subjectOf=function(q){

    if (!q) return 'General';
    if (q.section) return String(q.section);
    if (q.subject) return String(q.subject);
    if (q.subject_section) return String(q.subject_section);
    if (q.exam_subject) return String(q.exam_subject);
    // Fall back to subject_breakdown metadata
    const bd = ((this.data && this.data.anti_cheat_config && this.data.anti_cheat_config.subject_breakdown) || []);
    const oi = Number(q && q._orig_index != null ? q._orig_index : -1);
    if (oi >= 0 && bd.length > 1) {
      for (const b of bd) {
        const start = Number(b.start) || 0;
        const end = b.end != null ? Number(b.end) : (start + (Number(b.count) || 0) - 1);
        if (oi >= start && oi <= end) return b.name || 'General';
      }
    }
    return 'General';
  };

  Exam.sections=function(){
    const seen = []; const add = (s) => { const v = String(s || '').trim(); if (v && !seen.includes(v)) seen.push(v); };
    const bd = ((this.data && this.data.anti_cheat_config && this.data.anti_cheat_config.subject_breakdown) || []);
    if (Array.isArray(bd) && bd.length > 1) bd.forEach(b => add(b.name));
    this.qs().forEach(q => add(this.subjectOf(q)));
    return seen.length ? seen : ['General'];
  };

  Exam.currentSubject=function(){
    const q = this.qs()[this.idx];
    return this.subjectOf(q || { section: 'General' });
  };

  Exam.indexesForSubject=function(sec){
    const out = [];
    this.qs().forEach((q, i) => { if (this.subjectOf(q) === sec) out.push(i); });
    return out;
  };

  Exam.sectionStats=function(sec){
    let t = 0, a = 0;
    this.qs().forEach((q, i) => {
      if (this.subjectOf(q) === sec) {
        t++;
        const v = this.answers[i];
        if (v != null && String(v).trim() !== '') a++;
      }
    });
    return { t, a };
  };

  Exam.goSubject=function(sec){
    const i = this.qs().findIndex(q => this.subjectOf(q) === sec);
    if (i >= 0) { this.idx = i; this.render(); }
  };

  Exam.nextInSubject=function(){
    const list = this.indexesForSubject(this.currentSubject());
    const p = list.indexOf(this.idx);
    if (p >= 0 && p < list.length - 1) { this.idx = list[p + 1]; this.render(); }
  };
  Exam.prevInSubject=function(){
    const list = this.indexesForSubject(this.currentSubject());
    const p = list.indexOf(this.idx);
    if (p > 0) { this.idx = list[p - 1]; this.render(); }
  };

  // v2: renderTabs=function — multi-subject CBT tab renderer
  Exam.renderTabs=function(current){
    const secs = this.sections();
    if (secs.length <= 1) return '';
    return '<div class="cbt-subject-tabs">' + secs.map(sec => {
      const st = this.sectionStats(sec);
      const key = encodeURIComponent(sec);
      const isActive = sec === current;
      return '<button type="button" class="btn ' + (isActive ? 'btn-primary' : 'btn-outline') + '" data-sec="' + esc(key) + '" style="font-weight:800;background:' + (isActive ? 'linear-gradient(135deg,#1c72e7,#5e2174);color:white;border:0' : 'white;color:#1c72e7;border:1px solid #1c72e7') + '">' + esc(sec) + ' <span style="font-size:.68rem;opacity:.85">(' + st.a + '/' + st.t + ')</span></button>';
    }).join('') + '</div>';
  };

  Exam.renderPalette=function(current){
    let localNo = 0;
    return '<div class="q-palette"><div class="label">' + esc(current) + ' — question map</div>' + this.qs().map((qq, i) => {
      if (this.subjectOf(qq) !==current) return '';
      localNo++;
      const cls = i === this.idx ? 'current' : (this.answers[i] != null && String(this.answers[i]).trim() !== '' ? 'answered' : (this.flags[i] ? 'flagged' : ''));
      return '<button type="button" onclick="Exam.go(' + i + ')" class="' + cls + '" data-i="' + i + '" title="' + esc(current) + ' question ' + localNo + '">' + localNo + '</button>';
    }).join('') + '</div>';
  };

  Exam.render=function(){
    const FREE_TYPES_NO_OPTIONS = ['short','short_answer','numeric','essay','code','cloze','multinumeric','fill_blank','math_equation','fill'];
    const q = this.qs()[this.idx];
    if (!q) return;
    const current = this.currentSubject();
    const subjectIndexes = this.indexesForSubject(current);
    const localPos = subjectIndexes.indexOf(this.idx);
    const localNo = localPos + 1;
    const hasOptions = (q.options || []).length > 0 && !FREE_TYPES_NO_OPTIONS.includes((q.type || '').toLowerCase());

    const opts = hasOptions ? (q.options || []).map((o, i) => {
      const L = String.fromCharCode(65 + i);
      const checked = this.answers[this.idx] === L;
      return '<label class="option-label' + (checked ? ' selected' : '') + '"><input type="radio" name="opt" value="' + L + '" ' + (checked ? 'checked' : '') + ' style="display:none"><span class="option-letter">' + L + '</span><span class="option-text">' + esc(o) + '</span></label>';
    }).join('') : '';

    const free = !hasOptions ? '<textarea class="form-input" rows="3" placeholder="Type your answer here">' + esc(this.answers[this.idx] || '') + '</textarea>' : '';
    const m = Math.floor(this.remaining / 60), ss = this.remaining % 60;
    const urgent = this.remaining <= 60;

    const html = '<div class="card">' +
      this.renderTabs(current) +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:10px;flex-wrap:wrap">' +
        '<strong>' + esc(current) + ' · Q ' + localNo + ' / ' + subjectIndexes.length + ' <span style="color:#64748b;font-weight:600">(overall ' + (this.idx + 1) + ' / ' + this.qs().length + ')</span></strong>' +
        '<div><span class="clock' + (urgent ? ' urgent' : '') + '" id="clock">' + m + ':' + String(ss).padStart(2, '0') + '</span> <span id="viol" class="viol"></span></div>' +
      '</div>' +
      '<p style="font-size:1.05rem;margin:0 0 12px;line-height:1.5">' + esc(q.question || '(no question text)') + (q.mark ? ' <span style="color:#64748b;font-size:.85rem">[' + q.mark + ' mark' + (q.mark > 1 ? 's' : '') + ']</span>' : '') + '</p>' +
      opts + free +
      '<div class="actions">' +
        '<button type="button" class="btn btn-outline" data-act="prev-in" ' + (localPos <= 0 ? 'disabled' : '') + '>← Prev in ' + esc(current) + '</button>' +
        '<button type="button" class="btn btn-outline" data-act="flag">' + (this.flags[this.idx] ? '🚩 Unflag' : '🚩 Flag') + '</button>' +
        (localPos < subjectIndexes.length - 1
          ? '<button type="button" class="btn btn-primary" data-act="next-in">Next in ' + esc(current) + ' →</button>'
          : '<button type="button" class="btn btn-outline" disabled>End of ' + esc(current) + '</button>') +
        '<button type="button" class="btn btn-primary" data-act="submit">Submit Exam ✓</button>' +
      '</div>' +
      this.renderPalette(current) +
    '</div>';

    this.root().innerHTML = html;

    // Wire up the buttons
    if (this.root().querySelectorAll) this.root().querySelectorAll('.option-label').forEach((label, i) => {
      label.addEventListener('click', () => {
        const L = String.fromCharCode(65 + i);
        this.answer(L);
        // Re-render to update the selected state
        this.render();
      });
    });
    if (this.root().querySelectorAll) {
      this.root().querySelectorAll('.q-palette button').forEach(btn => {
        btn.addEventListener('click', () => { this.idx = Number(btn.dataset.i); this.render(); });
      });
      this.root().querySelectorAll('.cbt-subject-tabs button').forEach(btn => {
        btn.addEventListener('click', () => { this.goSubject(decodeURIComponent(btn.dataset.sec)); });
      });
      this.root().querySelectorAll('[data-act]').forEach(btn => {
        btn.addEventListener('click', () => {
          const a = btn.dataset.act;
          if (a === 'prev-in') this.prevInSubject();
          else if (a === 'next-in') this.nextInSubject();
          else if (a === 'flag') { this.flags[this.idx] = !this.flags[this.idx]; this.render(); }
          else if (a === 'submit') this.confirmSubmit();
        });
      });
      const ta = this.root().querySelector('textarea');
      if (ta) ta.addEventListener('input', () => this.answer(ta.value));
    }
  };

  Exam.answer = function(v){
    this.answers[this.idx] = v;
    this.saveDraft();
  };

  Exam.saveDraft = function(){
    try { localStorage.setItem('cbt-draft-' + (this.data && this.data.code), JSON.stringify({ a: this.answers, i: this.idx, t: Date.now() })); } catch(e) {}
  };

  Exam.confirmSubmit = function(){
    const unanswered = this.answers.filter(a => a == null || String(a).trim() === '').length;
    if (unanswered > 0 && !confirm(unanswered + ' question(s) unanswered. Submit anyway?')) return;
    this.submit();
  };

  /* ---------- Lifecycle ---------- */
  Exam.start = function(){
    const code = this.param();
    this.codeEntry(code || '');
  };

  Exam.codeEntry = function(prefill){
    this.root().innerHTML =
      '<div class="card">' +
        '<h2>📝 Enter exam details</h2>' +
        '<p style="color:#64748b;margin:0 0 16px;font-size:.9rem">Ask your teacher for the exam code. You can sit the exam with or without an account.</p>' +
        '<div class="form-group"><label>Exam code *</label><input class="form-input" id="e-code" value="' + esc(prefill) + '" placeholder="e.g. ABC123" autofocus></div>' +
        '<div class="form-group"><label>Your full name <span style="color:#94a3b8;font-weight:400">(optional for anonymous exams)</span></label><input class="form-input" id="e-name" placeholder="Surname First-name"></div>' +
        '<div class="form-group"><label>Your student / staff ID (if registered)</label><input class="form-input" id="e-id" placeholder="e.g. GOSA/2024/001"></div>' +
        '<div class="form-group"><label>Class</label><input class="form-input" id="e-class" placeholder="e.g. JSS 1A"></div>' +
        '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px">' +
          '<button type="button" class="btn btn-primary" id="e-start">Start Exam ▶</button>' +
          '<button type="button" class="btn btn-outline" id="e-guest">👤 Continue as Guest (anonymous)</button>' +
        '</div>' +
        '<p style="color:#94a3b8;font-size:.8rem;margin-top:12px">By starting the exam you consent to anti-cheat monitoring: window focus, copy/paste and fullscreen events are logged. Your teacher sees the integrity log with your result.</p>' +
      '</div>';

    $('e-start').addEventListener('click', () => Exam.load(false));
    $('e-guest').addEventListener('click', () => Exam.load(true));
  };

  Exam.load = async function(anon){
    if (!window.sb) {
      this.root().innerHTML = '<div class="card"><div class="notice notice-error">⚠ Database not configured. Open <code>assets/js/config.js</code> and add your Supabase URL and anon key.</div></div>';
      return;
    }
    const code = ($('e-code') || {}).value ? $('e-code').value.toUpperCase().trim() : '';
    let nm = ($('e-name') || {}).value ? $('e-name').value.trim() : '';
    if (anon && !nm) nm = 'Anonymous-' + Math.random().toString(36).slice(2, 7).toUpperCase();
    this.student = {
      name: nm || 'Anonymous-' + Math.random().toString(36).slice(2, 7).toUpperCase(),
      id_ref: ($('e-id') || {}).value ? $('e-id').value.trim() : '',
      class: ($('e-class') || {}).value ? $('e-class').value.trim() : '',
      anonymous: !!anon
    };
    if (!code) { toast('Enter the exam code.', 'warning'); return; }

    // 10-minute local exam cache
    let data = null, error = null;
    const cacheKey = 'cbt-exam-cache-' + code;
    try {
      const c = JSON.parse(localStorage.getItem(cacheKey) || 'null');
      if (c && (Date.now() - c.at) < 600000) data = c.exam;
    } catch (_) {}

    if (!data) {
      for (let attempt = 0; attempt < 5; attempt++) {
        try {
          const r = await window.sb.rpc('cbt_get_public_exam', { p_code: code });
          data = r.data; error = r.error;
        } catch (e) { error = e; }
        if (data && !error) break;
        const wait = Math.min(6000, (400 * Math.pow(2, attempt))) + Math.floor(Math.random() * 500);
        toast('Busy server — retrying (' + (attempt + 1) + '/5)…', 'info', 1500);
        await new Promise(r => setTimeout(r, wait));
      }
      if (data && !error && !data.wait && !data.closed) {
        try { localStorage.setItem(cacheKey, JSON.stringify({ at: Date.now(), exam: data })); } catch (_) {}
      }
    }

    if (error || !data) {
      this.root().innerHTML = '<div class="card"><div class="notice notice-error">❌ Exam not found or not open. Check the code and try again.</div>' + this.codeEntryHTML(code) + '</div>';
      $('e-code') && $('e-code').focus();
      return;
    }
    if (data.wait) {
      this.root().innerHTML = '<div class="card"><h2>⏳ Please wait</h2><p>This exam opens at <strong>' + (window.fmtDMYT ? fmtDMYT(data.start_at) : new Date(data.start_at).toLocaleString()) + '</strong>.</p></div>';
      return;
    }
    if (data.closed) {
      this.root().innerHTML = '<div class="card"><h2>🚫 Closed</h2><p>This exam is no longer accepting submissions.</p></div>';
      return;
    }
    this.data = data;
    if (window.CBT && typeof window.CBT.prepareForStudent === 'function') window.CBT.prepareForStudent(this.data);
    if (!this.qs().length) {
      this.root().innerHTML = '<div class="card"><h2>No questions</h2><p>This CBT exam has no valid questions. Ask your teacher to re-upload the CSV question bank. Make sure the CSV has a header row and at least one data row.</p></div>';
      return;
    }
    this.answers = new Array(this.qs().length).fill(null);
    this.flags = {};
    this.startTs = Date.now();
    this.deadline = Date.now() + ((data.duration || 45) * 60 * 1000);
    this.remaining = Math.max(0, Math.ceil((this.deadline - Date.now()) / 1000));

    if (data.instructions) {
      if (!confirm('Instructions:\n\n' + data.instructions + '\n\nClick OK to begin. You cannot pause the timer once started.')) {
        this.codeEntry(code);
        return;
      }
    }

    this.beginMonitor();
    this.tick();
    this.render();
  };

  Exam.codeEntryHTML = function(code) {
    return '<div style="margin-top:12px"><button type="button" class="btn btn-outline" id="e-retry">Try a different code</button></div>';
  };

  Exam.beginMonitor = function(){
    const cfg = (this.data && this.data.anti_cheat_config) || {};
    if (window.CBT && typeof window.CBT.startAntiCheat === 'function') {
      this.monitor = window.CBT.startAntiCheat(cfg, (type, n) => {
        this.violations = n;
        this.violationLog = this.monitor.log;
        const v = document.getElementById('viol');
        if (v) v.textContent = '⚠ ' + n + ' integrity flag(s)';
        if ((cfg.max_violations || 5) && n >= (cfg.max_violations || 5)) {
          toast('Too many integrity violations — submitting.', 'danger');
          this.submit();
        }
      });
    }
  };

  Exam.tick = function(){
    if (this.timer) clearInterval(this.timer);
    const update = () => {
      this.remaining = Math.max(0, Math.ceil((this.deadline - Date.now()) / 1000));
      const t = document.getElementById('clock');
      if (t) {
        const m = Math.floor(this.remaining / 60), ss = this.remaining % 60;
        t.textContent = m + ':' + String(ss).padStart(2, '0');
        if (this.remaining <= 60) t.classList.add('urgent');
      }
      if (this.remaining <= 0) { clearInterval(this.timer); this.timer = null; toast('Time up — submitting.', 'warning'); this.submit(); }
    };
    update();
    this.timer = setInterval(update, 1000);
  };

  Exam.submit = async function(){
    if (this._done) return;
    this._done = true;
    clearInterval(this.timer);
    if (this.monitor) try { this.monitor.stop(); } catch (e) {}
    const graded = (window.CBT && window.CBT.gradeSubmission) ? window.CBT.gradeSubmission(this.data, this.answers) : { score: 0, total: 0, percent: 0, grade: 'F', correct: 0, wrong: 0, skipped: 0 };
    const timeTaken = Math.round((Date.now() - this.startTs) / 1000);
    const payload = {
      exam_id: this.data.id,
      student_name: this.student.name,
      student_class: this.student.class,
      student_id_ref: this.student.id_ref,
      student_type: this.data.exam_mode,
      score: graded.score, total: graded.total, percent: graded.percent,
      correct_count: graded.correct, wrong_count: graded.wrong, skipped_count: graded.skipped,
      time_taken: timeTaken, violations: this.violations || 0, violation_log: this.violationLog || [],
      answers_data: this.qs().map((q, i) => ({
        index: (q._orig_index != null ? q._orig_index : i),
        subject: (q.section || q.subject || 'General'),
        answer: this.answers[i]
      }))
    };
    let resp = null;
    for (let attempt = 0; attempt < 6; attempt++) {
      try { resp = await window.sb.rpc('cbt_submit', { p_payload: payload }); } catch (e) { resp = { error: e }; }
      if (resp && !resp.error && resp.data && resp.data.saved) break;
      const wait = Math.min(8000, (500 * Math.pow(2, attempt))) + Math.floor(Math.random() * 600);
      this.root().insertAdjacentHTML('beforeend', '<p style="text-align:center;color:#64748b">Submitting… retry ' + (attempt + 1) + ' of 6</p>');
      await new Promise(r => setTimeout(r, wait));
    }
    if (!resp || resp.error || !resp.data || !resp.data.saved) {
      try { const q = JSON.parse(localStorage.getItem('cbt-pending-queue') || '[]'); q.push(payload); localStorage.setItem('cbt-pending-queue', JSON.stringify(q.slice(-10))); } catch (_) {}
    } else {
      try { localStorage.removeItem('cbt-pending-queue'); } catch (_) {}
    }
    try { localStorage.removeItem('cbt-draft-' + (this.data && this.data.code)); } catch (e) {}
    if (!resp || resp.error || !resp.data || !resp.data.saved) {
      const blob = new Blob([JSON.stringify({ payload, graded }, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      this.root().innerHTML =
        '<div class="card"><h2>⚠️ Could not save online</h2>' +
        '<p>Your answers are saved locally. Please download your result and send it to your teacher.</p>' +
        '<a class="btn btn-primary" href="' + url + '" download="exam-backup-' + this.data.code + '.json">⬇ Download backup</a></div>';
      return;
    }
    const d = resp.data;
    if (d.release_results === false) {
      this.root().innerHTML =
        '<div class="card" style="text-align:center;padding:40px">' +
        '<div style="font-size:3rem;margin-bottom:12px">✅</div>' +
        '<h2>Submission Received</h2>' +
        '<p style="color:#64748b">Your answers were recorded. Results will be released by your teacher.</p>' +
        '<p style="margin-top:20px"><a class="btn btn-outline" href="cbt.html">Back to CBT Manager</a></p>' +
        '</div>';
      return;
    }
    const pct = d.percent != null ? d.percent : graded.percent;
    const gradeColor = pct >= 75 ? '#1c72e7' : (pct >= 50 ? '#059669' : (pct >= 40 ? '#f59e0b' : '#dc2626'));
    this.root().innerHTML =
      '<div class="card" style="text-align:center;padding:40px">' +
      '<div class="score-circle" style="background:linear-gradient(135deg,' + gradeColor + ',#5e2174)"><div class="pct">' + (pct || 0) + '%</div><div class="lbl">Grade ' + (graded.grade || 'F') + '</div></div>' +
      '<h2 style="margin:0 0 8px">🎉 Exam Complete</h2>' +
      '<p style="color:#64748b;margin:0 0 16px">' + esc(this.student.name) + ' · ' + esc(this.data.title || 'Exam') + '</p>' +
      '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:520px;margin:0 auto">' +
      '<div style="padding:10px;background:#f8fafc;border-radius:10px"><div style="font-size:1.4rem;font-weight:900">' + (d.score != null ? d.score : graded.score) + '</div><div style="font-size:.7rem;color:#64748b;text-transform:uppercase">Score</div></div>' +
      '<div style="padding:10px;background:#f8fafc;border-radius:10px"><div style="font-size:1.4rem;font-weight:900">' + (d.correct_count != null ? d.correct_count : graded.correct) + '</div><div style="font-size:.7rem;color:#64748b;text-transform:uppercase">Correct</div></div>' +
      '<div style="padding:10px;background:#f8fafc;border-radius:10px"><div style="font-size:1.4rem;font-weight:900">' + (d.wrong_count != null ? d.wrong_count : graded.wrong) + '</div><div style="font-size:.7rem;color:#64748b;text-transform:uppercase">Wrong</div></div>' +
      '<div style="padding:10px;background:#f8fafc;border-radius:10px"><div style="font-size:1.4rem;font-weight:900">' + (d.skipped_count != null ? d.skipped_count : graded.skipped) + '</div><div style="font-size:.7rem;color:#64748b;text-transform:uppercase">Skipped</div></div>' +
      '</div>' +
      (d.cert_code ? '<p style="margin-top:20px">Certificate code: <strong style="font-size:1.1rem;color:#1c72e7">' + esc(d.cert_code) + '</strong></p>' : '') +
      (d.report_column ? '<p style="color:#64748b;font-size:.88rem">This result was added to the <strong>' + esc(d.report_column) + '</strong> column of your report card.</p>' : '') +
      '<p style="margin-top:20px"><a class="btn btn-primary" href="cbt.html">Back to CBT Manager</a> <a class="btn btn-outline" href="verify-certificate.html">Verify Certificate</a></p>' +
      '</div>';
  };

  // ENTERPRISE V8: flush any queued (failed) submissions from a previous session
  /* Flush any queued (failed) submissions from a previous session */
  (async function flushPending() {
    try {
      const q = JSON.parse(localStorage.getItem('cbt-pending-queue') || '[]');
      if (q.length && window.sb) {
        const rest = [];
        for (const p of q) {
          try {
            const r = await window.sb.rpc('cbt_submit', { p_payload: p });
            if (!(r && r.data && r.data.saved)) rest.push(p);
          } catch (_) { rest.push(p); }
        }
        localStorage.setItem('cbt-pending-queue', JSON.stringify(rest));
        if (q.length !== rest.length) {
          const msg = (q.length - rest.length) + ' queued submission(s) delivered.';
          if (window.toast) window.toast(msg, 'success');
        }
      }
    } catch (_) {}
  })();

  // Start the exam
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', () => Exam.start());
  else Exam.start();
})();
</script>
